model:
  # Vision Encoder - Google ViT-L/16
  vision_encoder: "google/vit-large-patch16-224"
  
  # LLM - InternVL3-8B-Instruct
  llm: "OpenGVLab/InternVL3-8B-Instruct"
  
  # Device settings
  device: "cuda"
  torch_dtype: "bfloat16"  # hoặc "float16" nếu GPU không hỗ trợ bfloat16

# Projection Layer config
projection:
  vision_dim: 1024      # ViT-L/16 hidden dim
  llm_dim: 4096         # InternVL3 hidden dim
  
# Sentiment Analysis config
sentiment:
  labels: ["positive", "negative", "neutral", "mixed"]
  confidence_threshold: 0.7

# Inference settings
inference:
  max_new_tokens: 512
  temperature: 0.3
  do_sample: false

# Image processing
image:
  size: 224
  mean: [0.5, 0.5, 0.5]
  std: [0.5, 0.5, 0.5]
